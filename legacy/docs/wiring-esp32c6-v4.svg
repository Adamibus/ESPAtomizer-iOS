<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -80 2000 1680">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: 700 42px/1.2 -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 24px/1.3 -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif; fill: #374151; }
      .label { font: 600 20px/1.3 -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif; fill: #000000; }
      .note { font: 17px/1.4 -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif; fill: #4b5563; }
      .board { fill: #1e293b; stroke: #0f172a; stroke-width: 3; rx: 12; }
      .box-max { fill: #fef3c7; stroke: #f59e0b; stroke-width: 3; rx: 8; }
      .box-oled { fill: #dbeafe; stroke: #3b82f6; stroke-width: 3; rx: 8; }
      .box-enc { fill: #e0e7ff; stroke: #6366f1; stroke-width: 3; rx: 8; }
      .box-fet { fill: #fee2e2; stroke: #ef4444; stroke-width: 3; rx: 8; }
      .box-batt { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; rx: 8; }
      .pinpad-pwr { fill: #fde047; stroke: #ca8a04; stroke-width: 2; rx: 4; }
      .pinpad-gnd { fill: #a1a1aa; stroke: #52525b; stroke-width: 2; rx: 4; }
      .pinpad { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 4; }
      .padtext { font: 700 18px/1.2 -apple-system, BlinkMacSystemFont, Segoe UI, monospace; fill: #000000; }
      .padhint { font: 600 14px/1.2 -apple-system, BlinkMacSystemFont, Segoe UI, monospace; fill: #374151; }
      .net-3v3-max { stroke: #f59e0b; stroke-width: 5; fill: none; }
      .net-gnd-max { stroke: #78716c; stroke-width: 5; fill: none; }
      .net-sck { stroke: #eab308; stroke-width: 5; fill: none; }
      .net-cs { stroke: #f97316; stroke-width: 5; fill: none; }
      .net-so { stroke: #fb923c; stroke-width: 5; fill: none; }
      .net-3v3-oled { stroke: #a855f7; stroke-width: 5; fill: none; }
      .net-gnd-oled { stroke: #6b7280; stroke-width: 5; fill: none; }
      .net-sda { stroke: #10b981; stroke-width: 5; fill: none; }
      .net-scl { stroke: #14b8a6; stroke-width: 5; fill: none; }
      .net-enc-a { stroke: #3b82f6; stroke-width: 5; fill: none; }
      .net-enc-b { stroke: #6366f1; stroke-width: 5; fill: none; }
      .net-enc-sw { stroke: #8b5cf6; stroke-width: 5; fill: none; }
      .net-gnd-enc { stroke: #52525b; stroke-width: 5; fill: none; }
      .net-pwm { stroke: #ef4444; stroke-width: 5; fill: none; }
      .net-gnd-fet { stroke: #44403c; stroke-width: 5; fill: none; }
      .net-batt { stroke: #16a34a; stroke-width: 5; fill: none; }
      .net-vmon { stroke: #84cc16; stroke-width: 5; fill: none; }
      .net-bat-plus { stroke: #ef4444; stroke-width: 5; fill: none; }
      .net-bat-minus { stroke: #111827; stroke-width: 5; fill: none; }
      .dot { fill: #000000; }
      .gnd-symbol { font: 700 26px/1 Arial, sans-serif; fill: #52525b; }
      .batpin-plus { fill: #ef4444; stroke: #7f1d1d; stroke-width: 2; }
      .batpin-minus { fill: #111827; stroke: #111827; stroke-width: 2; }
    ]]></style>
  </defs>
  
  <!-- White background -->
  <rect x="0" y="-80" width="2000" height="1680" fill="#ffffff"/>

  <text class="title" x="50" y="10">ESPAtomizer Wiring — Seeed XIAO ESP32‑C6</text>
  <text class="subtitle" x="50" y="35">Readable layout with unique trace colors · Left (top→bottom): D0→D6 · Right (top→bottom): 5V, ⏚, 3V3, D10→D7</text>

  <!-- Battery Circuit -->
    <!-- Battery Circuit -->
  <g id="battery" transform="translate(650,80)">
    <rect class="box-batt" width="480" height="360"/>
    <text class="subtitle" x="240" y="33" text-anchor="middle">3.7V LiPo Battery Circuit</text>
    
    <text class="label" x="40" y="90" text-anchor="start">Battery+</text>
    <text class="label" x="40" y="128" text-anchor="start">Battery−</text>
    <text class="label" x="40" y="166" text-anchor="start">Switch → 5V</text>
    <text class="label" x="40" y="204" text-anchor="start">Voltage Monitor → D3</text>
    
    <text class="note" x="40" y="250" text-anchor="start">• SPST switch between Battery+ and 5V</text>
    <text class="note" x="40" y="273" text-anchor="start">• Voltage divider: 100kΩ + 100kΩ (2:1 ratio)</text>
    <text class="note" x="40" y="296" text-anchor="start">• Max voltage: 4.2V → 2.1V for ADC</text>
    <text class="note" x="40" y="319" text-anchor="start">• D3 (GPIO21) has internal ADC</text>
    
    <circle id="bat-pos" class="pad" cx="440" cy="77" r="13"/>
    <circle id="bat-neg" class="pad" cx="440" cy="115" r="13"/>
    <circle id="bat-sw" class="pad" cx="440" cy="153" r="13"/>
    <circle id="bat-mon" class="pad" cx="440" cy="191" r="13"/>
    
    <text class="symbol" x="27" y="143" font-size="27">⏚</text>
  </g>

  <!-- Main Board (XIAO ESP32-C6) -->
  <g id="mainboard" transform="translate(750,480)">
    <rect class="board" x="0" y="0" width="480" height="640"/>
    <rect x="187" y="-24" width="106" height="48" fill="#f3f4f6" stroke="#0f172a" stroke-width="2" rx="6"/>
    <text class="subtitle" x="27" y="37" fill="#ffffff">XIAO ESP32‑C6</text>

    <!-- Battery input pins on top edge -->
    <g id="batteryPins">
      <circle id="bp-plus" class="batpin-plus" cx="460" cy="-20" r="8"/>
      <text class="label" x="460" y="-38" text-anchor="middle" fill="#ef4444">Battery +</text>
      <circle id="bp-minus" class="batpin-minus" cx="420" cy="-20" r="8"/>
      <text class="label" x="420" y="-38" text-anchor="middle" fill="#111827">Battery −</text>
    </g>

    <!-- Right pads (7): 5V, GND, 3V3, D10, D9, D8, D7 -->
    <!-- Labels on left (inside), pins on right edge of pad -->
    <g id="rightPads" transform="translate(347,93)">
      <g transform="translate(0,0)"><rect class="pinpad-pwr" x="0" y="0" width="133" height="35"/><text class="padtext" x="13" y="24">5V</text><circle id="pr-5v" class="dot" cx="133" cy="17.5" r="5"/></g>
      <g transform="translate(0,45)"><rect class="pinpad-gnd" x="0" y="0" width="133" height="35"/><text class="padtext" x="13" y="24">⏚</text><circle id="pr-gnd" class="dot" cx="133" cy="17.5" r="5"/></g>
      <g transform="translate(0,91)"><rect class="pinpad-pwr" x="0" y="0" width="133" height="35"/><text class="padtext" x="13" y="24">3V3</text><circle id="pr-3v3" class="dot" cx="133" cy="17.5" r="5"/></g>
      <g transform="translate(0,136)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="13" y="24">D10</text><text class="padhint" x="64" y="24">GPIO18</text><circle id="pr-d10" class="dot" cx="133" cy="17.5" r="5"/></g>
      <g transform="translate(0,181)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="13" y="24">D9</text><text class="padhint" x="64" y="24">GPIO20</text><circle id="pr-d9" class="dot" cx="133" cy="17.5" r="5"/></g>
      <g transform="translate(0,227)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="13" y="24">D8</text><text class="padhint" x="64" y="24">GPIO19</text><circle id="pr-d8" class="dot" cx="133" cy="17.5" r="5"/></g>
      <g transform="translate(0,272)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="13" y="24">D7</text><text class="padhint" x="64" y="24">GPIO17</text><circle id="pr-d7" class="dot" cx="133" cy="17.5" r="5"/></g>
    </g>

    <!-- Left pads (7): D0 at top, D6 at bottom (flipped) -->
    <!-- Labels on right (inside), pins on left edge of pad -->
    <g id="leftPads" transform="translate(0,93)">
      <g transform="translate(0,0)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="69" y="24" text-anchor="end">D0</text><text class="padhint" x="120" y="24" text-anchor="end">GPIO0</text><circle id="pl-d0" class="dot" cx="0" cy="17.5" r="5"/></g>
      <g transform="translate(0,45)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="69" y="24" text-anchor="end">D1</text><text class="padhint" x="120" y="24" text-anchor="end">GPIO1</text><circle id="pl-d1" class="dot" cx="0" cy="17.5" r="5"/></g>
      <g transform="translate(0,91)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="69" y="24" text-anchor="end">D2</text><text class="padhint" x="120" y="24" text-anchor="end">GPIO2</text><circle id="pl-d2" class="dot" cx="0" cy="17.5" r="5"/></g>
      <g transform="translate(0,136)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="69" y="24" text-anchor="end">D3</text><text class="padhint" x="120" y="24" text-anchor="end">GPIO21</text><circle id="pl-d3" class="dot" cx="0" cy="17.5" r="5"/></g>
      <g transform="translate(0,181)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="69" y="24" text-anchor="end">D4</text><text class="padhint" x="120" y="24" text-anchor="end">GPIO22</text><circle id="pl-d4" class="dot" cx="0" cy="17.5" r="5"/></g>
      <g transform="translate(0,227)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="69" y="24" text-anchor="end">D5</text><text class="padhint" x="120" y="24" text-anchor="end">GPIO23</text><circle id="pl-d5" class="dot" cx="0" cy="17.5" r="5"/></g>
      <g transform="translate(0,272)"><rect class="pinpad" x="0" y="0" width="133" height="35"/><text class="padtext" x="69" y="24" text-anchor="end">D6</text><text class="padhint" x="120" y="24" text-anchor="end">GPIO16</text><circle id="pl-d6" class="dot" cx="0" cy="17.5" r="5"/></g>
    </g>
  </g>

  <!-- MAX6675 module -->
  <g id="max6675" transform="translate(1467,227)">
    <rect class="box-max" x="0" y="0" width="480" height="320"/>
    <text class="subtitle" x="27" y="43">MAX6675 K‑Type Module</text>
    <text class="label" x="27" y="93">VCC → 3V3</text>
    <text class="label" x="27" y="141">GND</text>
  <text class="label" x="27" y="189">SCK → D10 (GPIO18)</text>
  <text class="label" x="27" y="237">CS → D9 (GPIO20)</text>
  <text class="label" x="27" y="285">SO → D8 (GPIO19)</text>
  <circle id="mx-vcc" cx="0" cy="85" r="6.5" class="dot" />
  <text class="label" x="-27" y="90" text-anchor="end" fill="#ef4444">3V3</text>
    <circle id="mx-gnd" cx="0" cy="133" r="6.5" class="dot" />
    <text class="label" x="-27" y="141" text-anchor="end" font-size="24">⏚</text>
    <circle id="mx-sck" cx="0" cy="181" r="6.5" class="dot" />
    <circle id="mx-cs"  cx="0" cy="229" r="6.5" class="dot" />
    <circle id="mx-so"  cx="0" cy="277" r="6.5" class="dot" />
  </g>

  <!-- OLED module -->
  <g id="oled" transform="translate(1467,640)">
    <rect class="box-oled" x="0" y="0" width="480" height="267"/>
    <text class="subtitle" x="27" y="43">SSD1306 OLED 128×64 (I2C)</text>
    <text class="label" x="27" y="93">VCC → 3V3</text>
    <text class="label" x="27" y="141">GND</text>
    <text class="label" x="27" y="189">SDA → D4 (GPIO22)</text>
    <text class="label" x="27" y="237">SCL → D5 (GPIO23)</text>
  <circle id="ol-vcc" cx="0" cy="85" r="6.5" class="dot" />
  <text class="label" x="-27" y="90" text-anchor="end" fill="#ef4444">3V3</text>
    <circle id="ol-gnd" cx="0" cy="133" r="6.5" class="dot" />
    <text class="label" x="-27" y="141" text-anchor="end" font-size="24">⏚</text>
    <circle id="ol-sda" cx="0" cy="181" r="6.5" class="dot" />
    <circle id="ol-scl" cx="0" cy="229" r="6.5" class="dot" />
  </g>

  <!-- Encoder module -->
  <g id="enc" transform="translate(80,360)">
    <rect class="box-enc" x="0" y="0" width="480" height="253"/>
    <text class="subtitle" x="453" y="43" text-anchor="end">Rotary Encoder (EC11 + SW)</text>
    <text class="label" x="453" y="85" text-anchor="end">D0 (GPIO0) → A</text>
    <text class="label" x="453" y="123" text-anchor="end">D1 (GPIO1) → B</text>
    <text class="label" x="453" y="160" text-anchor="end">D2 (GPIO2) → SW</text>
    <text class="label" x="453" y="197" text-anchor="end">GND → C</text>
    <circle id="en-a"  cx="480" cy="77" r="6.5" class="dot" />
    <circle id="en-b"  cx="480" cy="115" r="6.5" class="dot" />
    <circle id="en-sw" cx="480" cy="152" r="6.5" class="dot" />
    <circle id="en-c"  cx="480" cy="189" r="6.5" class="dot" />
    <text class="label" x="507" y="197" font-size="24">⏚</text>
  </g>

  <!-- MOSFET block -->
  <g id="fet" transform="translate(80,707)">
    <rect class="box-fet" x="0" y="0" width="520" height="293"/>
    <text class="subtitle" x="493" y="43" text-anchor="end">IRLB8721PBF MOSFET (Low‑Side)</text>
    <text class="label" x="493" y="85" text-anchor="end">D6 (GPIO16) via 100 Ω → Gate</text>
    <text class="label" x="493" y="123" text-anchor="end">Load − → Drain</text>
    <text class="label" x="493" y="160" text-anchor="end">GND → Source</text>
    <text class="note" x="27" y="200">Pinout (TO‑220AB): 1=Gate, 2=Drain (tab), 3=Source</text>
    <text class="note" x="27" y="229">Add 100 kΩ gate pulldown to ⏚. Add flyback diode for inductive loads.</text>
    <circle id="ft-g" cx="520" cy="77" r="6.5" class="dot" />
    <circle id="ft-d" cx="520" cy="115" r="6.5" class="dot" />
    <circle id="ft-s" cx="520" cy="152" r="6.5" class="dot" />
    <text class="label" x="547" y="160" font-size="24">⏚</text>
    <rect x="320" y="107" width="173" height="45" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text class="label" x="328" y="136">Load (+) → VBAT/5V</text>
  </g>

  <!-- Nets (coordinates matched to actual pin centers) -->
  <!-- Right side pin centers: x=1230 (750+347+133), y starts at 590.5 (480+93+17.5), spacing 45px -->
  <!-- Left side pin centers: x=750 (750+0+0), y starts at 590.5 (480+93+17.5), spacing 45px -->
  
  <!-- Power rails removed; 3V3 indicated by labels at module VCC pads -->

  <!-- MAX6675 signals from right side -->
  <line class="net-sck" x1="1230" y1="726.5" x2="1467" y2="408"/>        <!-- D10 (right pos 4) → MAX SCK -->
  <line class="net-so" x1="1230" y1="817.5" x2="1467" y2="504"/>         <!-- D8 (right pos 6) → MAX SO -->
  <line class="net-cs" x1="1230" y1="771.5" x2="1467" y2="456"/>         <!-- D9 (right pos 5) → MAX CS -->

  <!-- OLED I2C from left side (D4 is pos 5, D5 is pos 6) -->
  <line class="net-sda" x1="750" y1="771.5" x2="1467" y2="821"/>         <!-- D4 (left pos 5: 590.5+181) → OLED SDA -->
  <line class="net-scl" x1="750" y1="817.5" x2="1467" y2="869"/>         <!-- D5 (left pos 6: 590.5+227) → OLED SCL -->

  <!-- Encoder from left side (D0 is pos 1, D1 is pos 2, D2 is pos 3) -->
  <line class="net-enc-a" x1="750" y1="590.5" x2="560" y2="437"/>        <!-- D0 (left pos 1: 590.5+0) → ENC A -->
  <line class="net-enc-b" x1="750" y1="635.5" x2="560" y2="475"/>        <!-- D1 (left pos 2: 590.5+45) → ENC B -->
  <line class="net-enc-sw" x1="750" y1="681.5" x2="560" y2="512"/>       <!-- D2 (left pos 3: 590.5+91) → ENC SW -->

  <!-- MOSFET from left side (D6 is pos 7) -->
  <line class="net-pwm" x1="750" y1="862.5" x2="600" y2="784"/>          <!-- D6 (left pos 7: 590.5+272) → FET Gate -->

  <!-- Battery circuit traces (routed to avoid crossing boxes) -->
  <path class="net-bat-plus" d="M1210,460 V157 H1090"/>                 <!-- Board Battery+ → single bend → Battery+ pad -->
  <path class="net-bat-minus" d="M1170,460 V195 H1090"/>                <!-- Board Battery− → single bend → Battery− pad -->
  <line class="net-vmon" x1="750" y1="726.5" x2="1090" y2="271"/>        <!-- D3 (left pos 4: 590.5+136) → Battery Monitor -->

  <!-- Legend -->
  <g id="legend" transform="translate(50,1320)">
    <rect fill="#f9fafb" stroke="#9ca3af" stroke-width="2" x="0" y="0" width="1900" height="147" rx="8"/>
    <text class="subtitle" x="27" y="43">Signal Legend — Each trace has unique color (⏚ grounds shown as symbols)</text>
    <g transform="translate(53,53)" class="label">
      <!-- Row 1 -->
  <line class="net-sck" x1="0" y1="0" x2="53" y2="0"/><text x="64" y="5">SCK (D10)</text>
  <line class="net-cs" x1="480" y1="0" x2="533" y2="0"/><text x="544" y="5">CS (D9)</text>
  <line class="net-so" x1="693" y1="0" x2="747" y2="0"/><text x="757" y="5">SO (D8)</text>
  <line class="net-sda" x1="907" y1="0" x2="960" y2="0"/><text x="971" y="5">SDA (D4)</text>
  <line class="net-scl" x1="1133" y1="0" x2="1186" y2="0"/><text x="1197" y="5">SCL (D5)</text>
      
      <!-- Row 2 -->
      <g transform="translate(0,35)">
        <line class="net-enc-a" x1="0" y1="0" x2="53" y2="0"/><text x="64" y="5">ENC A (D0)</text>
        <line class="net-enc-b" x1="240" y1="0" x2="293" y2="0"/><text x="304" y="5">ENC B (D1)</text>
        <line class="net-enc-sw" x1="480" y1="0" x2="533" y2="0"/><text x="544" y="5">ENC SW (D2)</text>
        <line class="net-pwm" x1="720" y1="0" x2="773" y2="0"/><text x="784" y="5">PWM Gate (D6)</text>
        <line class="net-bat-plus" x1="960" y1="0" x2="1013" y2="0"/><text x="1024" y="5">Battery +</text>
        <line class="net-bat-minus" x1="1200" y1="0" x2="1253" y2="0"/><text x="1264" y="5">Battery −</text>
        <line class="net-vmon" x1="1440" y1="0" x2="1493" y2="0"/><text x="1504" y="5">Voltage Mon (D3)</text>
      </g>
    </g>
  </g>

  <text class="note" x="50" y="1290">Left pins flipped: D0 at top → D6 at bottom. Right pins: 5V, ⏚, 3V3, D10→D7 (top to bottom). Each trace color is unique for easy identification.</text>
</svg>